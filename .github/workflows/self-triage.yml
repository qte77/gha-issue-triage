# Self-triage: dogfoods the action by triaging every new/edited issue in
# this repo. Side effects: labels may be added; one sticky summary comment
# is posted (or edited on re-runs).
#
# Label-application by the action uses secrets.GITHUB_TOKEN, so the
# resulting `issues: labeled` events do NOT trigger this workflow again
# (GitHub blocks re-triggering from default-token actions). No loop risk.
name: Self-triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  models: read
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-issue-triage@main
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AI_TOKEN omitted → action defaults to github.token;
          # combined with `permissions: models: read` above, that authenticates
          # GitHub Models calls without a separate PAT. See docs/integrations.md.
